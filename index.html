<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <meta name="theme-color" content="#f7f7f4">
    <meta property="og:title" content="Site temporarily offline">
    <meta property="og:description" content="This homepage is temporarily offline.">
    <meta property="og:type" content="website">
    <title>Site Temporarily Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --text: #20211f;
        --muted: #62645f;
        --line: #d8d9d2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 520px);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 40px 0;
      }

      p {
        margin: 0;
      }

      .status {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0 14px;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .message {
        max-width: 34rem;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="offline-title">
      <p class="status">Offline</p>
      <h1 id="offline-title">Site temporarily offline</h1>
      <p class="message">This homepage is currently unavailable.</p>
    </main>
  </body>
</html>
